[tox]
requires = tox>=4
min_version = 4.0
envlist =
    py{310,311,312}-dj{42,52}
    py313-dj52

[testenv]
commands = python testrunner.py
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
deps =
    python-dotenv[cli]
    dj42: django>=4.2,<4.3
    dj52: django>=5.2,<5.3

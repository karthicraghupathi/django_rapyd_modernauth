# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
  python: python3
exclude: |
  (?x)(
    migrations/|
    .idea/|
    venv/|
    .git/
  )
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.8
    hooks:
      - id: uv-lock
      - id: uv-export
        args:
          - "--frozen"
          - "--all-extras"
          - "--no-emit-project"
          - "--output-file=requirements-dev.txt"
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # uv run picks up the project's .venv automatically. The
        # django-stubs plugin imports testproject.settings, which reads
        # DJANGO_SECRET_KEY at import time, so we inject a stub value
        # here so the hook works regardless of whether .env is loaded
        # in the user's shell.
        entry: uv run env DJANGO_SECRET_KEY=mypy-stub-secret-not-for-production mypy --config-file pyproject.toml
        language: system
        types: [python]
        pass_filenames: false
        files: ^modernauth/

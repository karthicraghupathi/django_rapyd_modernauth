name: publish

on:
  # Primary trigger: tag push fires this directly under the user's identity,
  # which avoids the GITHUB_TOKEN cross-workflow chaining limitation.
  push:
    tags: ["v*"]
  # Fallback trigger: if the GitHub Release is recreated by a user (e.g. for
  # a manual re-publish recovery), this also fires the workflow.
  release:
    types: [published]
  # Manual escape hatch.
  workflow_dispatch:

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/django-rapyd-modernauth
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Resolve the right ref regardless of which trigger fired:
          # - release event: github.event.release.tag_name
          # - push:tags or workflow_dispatch --ref <tag>: github.ref_name
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify dist contents
        run: ls -la dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

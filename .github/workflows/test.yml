name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.toxenv }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: "3.10", toxenv: "py310-dj42" }
          - { python: "3.10", toxenv: "py310-dj52" }
          - { python: "3.11", toxenv: "py311-dj42" }
          - { python: "3.11", toxenv: "py311-dj52" }
          - { python: "3.12", toxenv: "py312-dj42" }
          - { python: "3.12", toxenv: "py312-dj52" }
          - { python: "3.13", toxenv: "py313-dj52" }
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Provision .env for testproject settings
        run: echo "DJANGO_SECRET_KEY=ci-test-secret-not-for-production" > .env

      - name: Run tox env
        env:
          TOXENV: ${{ matrix.toxenv }}
        run: uvx tox -e "$TOXENV"

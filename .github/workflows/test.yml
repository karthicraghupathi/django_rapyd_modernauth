name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.toxenv }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: "3.10", toxenv: "py310-dj42" }
          - { python: "3.10", toxenv: "py310-dj52" }
          - { python: "3.11", toxenv: "py311-dj42" }
          - { python: "3.11", toxenv: "py311-dj52" }
          - { python: "3.12", toxenv: "py312-dj42" }
          - { python: "3.12", toxenv: "py312-dj52" }
          - { python: "3.13", toxenv: "py313-dj52" }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Provision .env for testproject settings
        run: echo "DJANGO_SECRET_KEY=ci-test-secret-not-for-production" > .env

      - name: Run tox env
        env:
          TOXENV: ${{ matrix.toxenv }}
        run: tox -e "$TOXENV"

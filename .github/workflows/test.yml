name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.toxenv }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: "3.10", toxenv: "py310-dj42" }
          - { python: "3.10", toxenv: "py310-dj52" }
          - { python: "3.11", toxenv: "py311-dj42" }
          - { python: "3.11", toxenv: "py311-dj52" }
          - { python: "3.12", toxenv: "py312-dj42" }
          - { python: "3.12", toxenv: "py312-dj52" }
          - { python: "3.13", toxenv: "py313-dj52" }
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Provision .env for testproject settings
        run: echo "DJANGO_SECRET_KEY=ci-test-secret-not-for-production" > .env

      - name: Run tox env
        env:
          TOXENV: ${{ matrix.toxenv }}
        run: uvx tox -e "$TOXENV"

  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync project dev dependencies
        run: uv sync --all-extras

      - name: Provision .env for testproject settings
        run: echo "DJANGO_SECRET_KEY=ci-test-secret-not-for-production" > .env

      - name: Run pre-commit hooks (ruff + mypy + uv-lock + uv-export)
        run: uv run pre-commit run --all-files --show-diff-on-failure

  verify-wheel:
    name: Verify built wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Assert expected files are present in the wheel
        run: |
          set -eux
          for f in py.typed apps.py admin.py models.py __init__.py \
                   migrations/__init__.py migrations/0001_initial.py; do
            unzip -p dist/*.whl "modernauth/$f" >/dev/null
          done

      - name: Install wheel into a fresh venv and verify import
        run: |
          uv venv /tmp/wheel-venv
          uv pip install --python /tmp/wheel-venv/bin/python dist/*.whl
          /tmp/wheel-venv/bin/python -c '
          import os, modernauth
          assert modernauth.__version__, "modernauth.__version__ is empty"
          marker = os.path.join(os.path.dirname(modernauth.__file__), "py.typed")
          assert os.path.exists(marker), "py.typed marker missing in installed package"
          print("wheel ok, version=" + modernauth.__version__)
          '
